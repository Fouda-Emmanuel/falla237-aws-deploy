{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Falla237 - Offline</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}?v=2">
  <link rel="manifest" href="/manifest.json">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #0a0302;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 500px;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .offline-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      color: #dc3545;
    }
    h1 {
      font-weight: 700;
      margin-bottom: 15px;
      color: #0a0302;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #495057;
    }
    .btn-refresh {
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      background: #0055ff;
      border: none;
    }
    .btn-refresh:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,85,255,0.3);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
    </svg>
    <h1>Oops! You're Offline</h1>
    <p>Falla237 requires an internet connection for full functionality.</p>
    <p>You can still view previously loaded content while offline.</p>
    <button class="btn btn-primary btn-refresh text-white" onclick="window.location.reload()">
      Try Again
    </button>
  </div>

  <script>
    // Register service worker and check for updates
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(registration => {
          console.log('ServiceWorker registration successful');
          
          // Check for update every time the page loads
          registration.update().then(() => {
            if (registration.waiting) {
              // New update available - prompt user to refresh
              if (confirm("A new version is available. Refresh now?")) {
                registration.waiting.postMessage('skipWaiting');
                window.location.reload();
              }
            }
          });
        })
        .catch(error => {
          console.log('ServiceWorker registration failed:', error);
        });
    }
  </script>
</body>
</html>
